services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./train:/app/train:ro
    environment:
      - MODELS_DIR=/app/models
      - DATA_DIR=/app/data
      - TRAIN_DIR=/app/train
      - MODEL_REASSORT=/app/models/xgboost_30d_final.pkl
      - MODEL_SEGMENTATION=/app/models/kmeans_bundle_v1.joblib
      - RFM_SEGMENTS_CSV=/app/data/rfm_segments.csv
      - CUSTOMER_RECOMMENDATION_CSV=/app/data/customer_recommendation.csv

  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
