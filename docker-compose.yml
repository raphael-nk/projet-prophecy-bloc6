services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)); assert d.get('reassort_ready') is True",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./train:/app/train:ro
    environment:
      - MODELS_DIR=/app/models
      - DATA_DIR=/app/data
      - TRAIN_DIR=/app/train
      - MODEL_REASSORT=/app/models/xgboost_30d_final.pkl
      - MODEL_SEGMENTATION=/app/models/kmeans_bundle_v1.joblib
      - RFM_SEGMENTS_CSV=/app/data/rfm_segments.csv
      - CUSTOMER_RECOMMENDATION_CSV=/app/data/customer_recommendation.csv

  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
